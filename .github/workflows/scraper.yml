name: Scraper CAP
on:
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary
      - run: |
          python - <<'EOF'
          import os, logging, psycopg2
          logging.basicConfig(level=logging.INFO)
          log = logging.getLogger(__name__)
          host = os.environ["DB_HOST"].strip()
          codes = "-".join(str(ord(c)) for c in host)
          log.info(f"LEN={len(host)} CODES={codes}")
          conn = psycopg2.connect(
              host=host,
              port=int(os.environ.get("DB_PORT", "5432").strip()),
              dbname=os.environ["DB_NAME"].strip(),
              user=os.environ["DB_USER"].strip(),
              password=os.environ["DB_PASSWORD"].strip(),
              sslmode="require"
          )
          log.info("Conexion OK")
          cur = conn.cursor()
          cur.execute("select count(*) from comunidades_autonomas;")
          log.info(f"Comunidades en BD: {cur.fetchone()[0]}")
          conn.close()
          EOF
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
